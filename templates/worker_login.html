<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Login | HomeServe</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: rgba(99, 102, 241, 0.15);
            --dark: #1e293b; --gray: #64748b; --light: #f8fafc; --white: #ffffff;
            --border: #e2e8f0; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b;
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--light);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        /* 🔔 Toast Container - CENTERED ONCE, NEVER ANIMATED */
        #toastContainer {
            position: fixed; top: 30px; left: 50%;
            transform: translateX(-50%); z-index: 9999;
            width: 90%; max-width: 420px; pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
        }
        .toast-msg {
            width: 100%; padding: 14px 18px; margin: 6px 0; border-radius: 12px;
            font-size: 14px; font-weight: 600; text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12); background: var(--white);
            border-left: 5px solid var(--primary); pointer-events: auto;
            opacity: 0; transform: translateY(-15px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .toast-msg.visible { opacity: 1; transform: translateY(0); }
        .toast-msg.success { border-left-color: var(--success); background: #f0fdf4; color: #166534; }
        .toast-msg.danger  { border-left-color: var(--danger); background: #fef2f2; color: #991b1b; }
        .toast-msg.warning { border-left-color: var(--warning); background: #fffbeb; color: #92400e; }

        .login-card {
            display: flex; width: 100%; max-width: 800px; min-height: 500px;
            background: var(--white); border-radius: 24px; overflow: hidden;
            box-shadow: var(--shadow-lg); animation: cardEnter 0.5s ease-out;
        }
        @keyframes cardEnter { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .login-image {
            width: 45%; background: url('https://images.unsplash.com/photo-1504148455328-c376907d081c?auto=format&fit=crop&q=80&w=1000') center/cover;
            position: relative; display: flex; flex-direction: column; justify-content: center;
            padding: 35px; color: white; text-align: center;
        }
        .login-image::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.35), rgba(79, 70, 229, 0.25)); z-index: 1;
        }
        .login-image > * { position: relative; z-index: 2; }
        .login-image h1 { font-size: 26px; font-weight: 800; margin-bottom: 10px; line-height: 1.2; }
        .login-image p { font-size: 13px; opacity: 0.95; line-height: 1.5; }
        .login-form-area { width: 55%; padding: 35px 40px; display: flex; flex-direction: column; justify-content: center; }
        h2 { color: var(--dark); font-size: 22px; font-weight: 800; margin-bottom: 6px; }
        .subtitle { color: var(--gray); font-size: 13px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--gray); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px; }
        input {
            width: 100%; padding: 11px 14px; padding-right: 40px; border: 2px solid var(--border);
            border-radius: 10px; font-size: 14px; font-weight: 500; background: var(--light);
            transition: all 0.2s ease; font-family: inherit; margin-bottom: 12px;
        }
        input::placeholder { color: #94a3b8; font-weight: 400; }
        input:hover { border-color: #cbd5e1; background: white; }
        input:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px var(--primary-light); transform: translateY(-1px); }
        input.error { border-color: var(--danger); background: #fef2f2; }
        input.error:focus { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15); }
        .error-text { color: var(--danger); font-size: 11px; font-weight: 600; margin-top: 3px; margin-bottom: 8px; display: none; }
        .error-text.show { display: block; animation: slideDown 0.2s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .password-toggle {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            color: var(--gray); cursor: pointer; background: none; border: none;
            padding: 6px; font-size: 15px; transition: color 0.2s;
            display: flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; border-radius: 8px; z-index: 5;
        }
        .password-toggle:hover { color: var(--primary); background: rgba(99, 102, 241, 0.08); }
        .input-wrapper { position: relative; margin-bottom: 12px; }
        button {
            width: 100%; padding: 13px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: all 0.25s ease; margin-top: 8px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4); }
        button:active { transform: translateY(0); }
        button.loading { pointer-events: none; opacity: 0.85; }
        button.loading::after {
            content: ''; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer-links { text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border); font-size: 13px; color: var(--gray); }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .footer-links a:hover { text-decoration: underline; }
        @media (max-width: 800px) {
            .login-card { flex-direction: column; max-width: 420px; min-height: auto; }
            .login-image { width: 100%; height: 150px; padding: 25px; }
            .login-image h1 { font-size: 22px; }
            .login-form-area { width: 100%; padding: 30px 28px; }
        }
        @media (max-width: 420px) { body { padding: 10px; } .login-form-area { padding: 28px 24px; } h2 { font-size: 20px; } }
    </style>
</head>
<body>

<!-- 🔔 Toast Container -->
<div id="toastContainer"></div>

<div class="login-card">
    <div class="login-image">
        <h1>Welcome Back!</h1>
        <p>Log in to access your worker dashboard, manage appointments, and update your availability.</p>
    </div>
    <div class="login-form-area">
        <h2>Worker Login</h2>
        <p class="subtitle">Please enter your professional credentials.</p>

        <form action="{{ url_for('worker_login') }}" method="POST" id="loginForm" novalidate>
            <div class="input-wrapper">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@company.com" required autocomplete="email">
                <div class="error-text" id="emailError">This field is required</div>
            </div>
            <div class="input-wrapper">
                <label>Password</label>
                <input type="password" name="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                    <i class="fas fa-eye"></i>
                </button>
                <div class="error-text" id="passwordError">This field is required</div>
            </div>
            <button type="submit"><i class="fas fa-sign-in-alt"></i> Login to Account</button>
        </form>

        <div class="footer-links">
            New user? <a href="{{ url_for('worker_register') }}">Register as Worker</a>
        </div>
    </div>
</div>

<script>
// Password toggle (keep existing)
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (!input || !icon) return;
    if (input.type === 'password') {
        input.type = 'text'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye');
    }
    input.focus();
}

// Field validation (keep existing)
function validateField(input, errorId) {
    const errorEl = document.getElementById(errorId);
    const value = input.value.trim();
    input.classList.remove('error');
    if (errorEl) errorEl.classList.remove('show');
    if (!value) {
        input.classList.add('error');
        if (errorEl) { errorEl.textContent = 'This field is required'; errorEl.classList.add('show'); }
        return false;
    }
    if (input.type === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
        input.classList.add('error');
        if (errorEl) { errorEl.textContent = 'Enter a valid email'; errorEl.classList.add('show'); }
        return false;
    }
    return true;
}

// ✅ BIG, ATTRACTIVE TOAST (Rectangular Card Style - Same across all pages)
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    if (!container) return;
    
    const styles = {
        success: { 
            bg: 'linear-gradient(135deg, #f0fdf4, #dcfce7)', 
            border: '#22c55e', 
            text: '#166534', 
            icon: 'circle-check',
            shadow: '0 8px 25px rgba(34, 197, 94, 0.25)'
        },
        error: { 
            bg: 'linear-gradient(135deg, #fef2f2, #fee2e2)', 
            border: '#ef4444', 
            text: '#b91c1c', 
            icon: 'circle-xmark',
            shadow: '0 8px 25px rgba(239, 68, 68, 0.25)'
        },
        warning: { 
            bg: 'linear-gradient(135deg, #fffbeb, #fef3c7)', 
            border: '#f59e0b', 
            text: '#92400e', 
            icon: 'triangle-exclamation',
            shadow: '0 8px 25px rgba(245, 158, 11, 0.25)'
        }
    };
    const style = styles[type] || styles.success;
    
    const toast = document.createElement('div');
    toast.style.cssText = `
        width: 100%; max-width: 480px; padding: 20px 24px; margin: 8px 0;
        border-radius: 16px; background: ${style.bg}; border-left: 5px solid ${style.border};
        color: ${style.text}; font-size: 16px; font-weight: 700; text-align: center;
        box-shadow: ${style.shadow}; display: flex; align-items: center; gap: 14px;
        pointer-events: auto; opacity: 0; transform: translateY(-20px);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    `;
    toast.innerHTML = `<i class="fas fa-${style.icon}" style="font-size: 22px;"></i><span style="flex: 1;">${message}</span>`;
    container.appendChild(toast);
    
    void toast.offsetWidth;
    toast.style.opacity = '1';
    toast.style.transform = 'translateY(0)';
    
    setTimeout(() => {
        toast.style.opacity = '0'; toast.style.transform = 'translateY(-20px)';
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

// Handle form submissions & initial load
document.addEventListener('DOMContentLoaded', function() {
    const firstInput = document.querySelector('#loginForm input[required]');
    if (firstInput) firstInput.focus();

    // Validation listeners
    document.querySelectorAll('input[required]').forEach(input => {
        input.addEventListener('blur', function() { validateField(this, this.name + 'Error'); });
        input.addEventListener('input', function() {
            if (this.classList.contains('error')) {
                this.classList.remove('error');
                const errorEl = document.getElementById(this.name + 'Error');
                if (errorEl) errorEl.classList.remove('show');
            }
        });
    });

    // AJAX Form Submit
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        let isValid = true;
        this.querySelectorAll('input[required]').forEach(input => {
            if (!validateField(input, input.name + 'Error')) isValid = false;
        });
        if (!isValid) {
            const firstError = this.querySelector('input.error');
            if (firstError) firstError.focus();
            return;
        }

        const btn = this.querySelector('button[type="submit"]');
        const originalText = btn ? btn.innerHTML : '';
        const originalDisabled = btn ? btn.disabled : false;
        
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...'; }

        try {
            const response = await fetch(this.action, {
                method: 'POST',
                body: new FormData(this),
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });
            const data = await response.json();

            if (data.success) {
                showToast(data.message, 'success');
                if (data.redirect) setTimeout(() => { window.location.href = data.redirect; }, 1200);
            } else {
                showToast(data.message || 'Something went wrong', 'error');
                if (btn) { btn.disabled = originalDisabled; btn.innerHTML = originalText; }
            }
        } catch (error) {
            console.error('Error:', error);
            showToast('Network error. Please try again.', 'error');
            if (btn) { btn.disabled = originalDisabled; btn.innerHTML = originalText; }
        }
    });

    // Fallback: Handle URL params if page loads after redirect
    const params = new URLSearchParams(window.location.search);
    if (params.get('success') === 'logged_in') {
        showToast('✅ Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = '{{ url_for("worker_dashboard") }}', 1200);
        window.history.replaceState({}, '', window.location.pathname);
    } else if (params.get('success') === 'registered') {
        showToast('✅ Registration successful! Please login.', 'success');
        window.history.replaceState({}, '', window.location.pathname);
    } else if (params.get('error')) {
        showToast(params.get('error') === 'invalid' ? '⚠️ Invalid email or password' : '❌ Something went wrong', 'error');
        window.history.replaceState({}, '', window.location.pathname);
    }
});
</script>
</body>
</html>
