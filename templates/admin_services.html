<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Service Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --success: #10b981;
            --danger: #ef4444;
            --bg-canvas: #f8fafc;
            --card-bg: #ffffff;
            --text-heading: #1e293b;
            --text-body: #64748b;
            --border-color: #e2e8f0;
            --input-focus: #818cf8;
        }

        * { box-sizing: border-box; transition: all 0.25s ease; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-body);
            margin: 0;
            padding: 40px 20px;
        }

        .wrapper {
            max-width: 1100px;
            margin: 0 auto;
        }

        .page-header { margin-bottom: 35px; }
        .page-header h1 { 
            font-size: 28px; 
            color: var(--text-heading); 
            margin: 0; 
            font-weight: 800;
        }
        .page-header p { margin-top: 6px; font-size: 14px; opacity: 0.9; }

        .premium-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 25px;
            margin-bottom: 25px;
        }

        .add-grid {
            display: grid;
            grid-template-columns: 1.5fr 2.5fr 1fr 1.2fr 1fr;
            gap: 12px;
            align-items: end;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-heading);
            margin-bottom: 6px;
            letter-spacing: 0.4px;
        }

        input, select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 13px;
            background: #f8fafc;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        /* File Upload Styling */
        input[type="file"] {
            padding: 8px;
            background: white;
            cursor: pointer;
            font-size: 12px;
        }

        input[type="file"]::-webkit-file-upload-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            margin-right: 10px;
            transition: background 0.2s;
        }

        input[type="file"]::-webkit-file-upload-button:hover {
            background: #4f46e5;
        }

        .file-hint {
            font-size: 10px;
            color: var(--text-body);
            margin-top: 3px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all 0.25s;
        }

        .btn-main {
            background: var(--primary);
            color: white;
        }

        .btn-main:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-update {
            background: #f1f5f9;
            color: var(--primary);
        }

        .btn-update:hover {
            background: var(--primary);
            color: white;
        }

        .btn-update.is-modified {
            background: var(--success) !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-delete {
            background: transparent;
            color: #94a3b8;
        }

        .btn-delete:hover {
            color: var(--danger);
            background: #fee2e2;
        }

        .table-container {
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background: #f8fafc;
            padding: 16px 20px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            border-bottom: 1px solid var(--border-color);
        }

        td { padding: 18px 20px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }

        .service-name-input {
            font-weight: 700;
            font-size: 15px;
            color: var(--text-heading);
            border: 1px solid transparent;
            background: transparent;
            margin-bottom: 4px;
            width: 100%;
        }

        .service-desc-input {
            font-size: 13px;
            color: var(--text-body);
            border: 1px solid transparent;
            background: transparent;
            width: 100%;
        }

        .price-wrapper {
            display: flex;
            align-items: center;
            background: #dcfce7;
            color: var(--success);
            padding: 5px 10px;
            border-radius: 8px;
            width: fit-content;
            font-weight: 700;
            font-size: 13px;
        }

        .price-wrapper input {
            background: transparent;
            border: none;
            color: var(--success);
            padding: 0;
            margin-left: 4px;
            width: 60px;
            font-weight: 700;
            font-size: 13px;
        }

        /* Image Preview in Table */
        .image-preview {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            background: #f1f5f9;
            border: 2px solid var(--border-color);
        }

        .image-preview-placeholder {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 20px;
            border: 2px dashed var(--border-color);
        }

        .search-row {
            margin-bottom: 18px;
            display: flex;
            align-items: center;
        }

        .search-row input {
            max-width: 350px;
            background: white;
        }

        @media (max-width: 900px) {
            .add-grid { grid-template-columns: 1fr; }
            .btn { width: 100%; }
            table { font-size: 12px; }
            td, th { padding: 12px 15px; }
            .image-preview { width: 50px; height: 50px; }
        }
           .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: right;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 14px;
            text-decoration:none;
        }
        .back-btn
        {
            top:20px;
            right:20px;
            font-size:20px;
            font-weight:bold;
            position:fixed;
        }
       
    </style>
</head>
<body>
 <div class="top-bar">
      
        <a href="{{ url_for('admin_dashboard') }}" class="back-btn "style="text-decoration:none;"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>

<div class="wrapper">
    <div class="page-header">
        <h1>Service Management</h1>
        <p>Manage your business catalog with precision.</p>
    </div>

    <!-- ✅ ADD SERVICE FORM WITH IMAGE UPLOAD -->
    <div class="premium-card">
        <form method="POST" class="add-grid" enctype="multipart/form-data">
            <input type="hidden" name="action" value="add">
            <div>
                <label>Service Name</label>
                <input type="text" name="name" placeholder="e.g. Premium Styling" required>
            </div>
            <div>
                <label>Description</label>
                <input type="text" name="description" placeholder="Describe the service..." required>
            </div>
            <div>
                <label>Price (₹)</label>
                <input type="number" name="price" placeholder="499" required min="0" step="0.01">
            </div>
            <div>
                <label>Service Image</label>
                <input type="file" name="image" accept="image/*">
                <div class="file-hint">Optional: JPG, PNG, max 2MB</div>
            </div>
            <button type="submit" class="btn btn-main">Publish Now</button>
        </form>
    </div>

    <div class="search-row">
        <input type="text" id="searchInput" placeholder="Quick search services..." onkeyup="filterTable()">
    </div>

    <div class="table-container">
        <table id="serviceTable">
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Service Details</th>
                    <th>Pricing</th>
                    <th style="text-align: right;">Management</th>
                </tr>
            </thead>
            <tbody>
                {% for service in services %}
                <tr>
                    <form method="POST" enctype="multipart/form-data">
                        <input type="hidden" name="service_id" value="{{ service.id }}">
                        
                        <!-- Image Column -->
                        <td style="text-align: center;">
    {% if service.image %}
        <img src="{{ url_for('static', filename='uploads/services/' + service.image) }}" 
             alt="{{ service.name }}" 
             class="image-preview"
             onerror="this.onerror=null; this.src='https://via.placeholder.com/60x60/6366f1/ffffff?text=No+Image';">
    {% else %}
        <div class="image-preview-placeholder">🖼️</div>
    {% endif %}
</td>
                        
                        <!-- Details Column -->
                        <td>
                            <input type="text" name="name" value="{{ service.name }}" 
                                   class="service-name-input search-target" oninput="handleEdit(this)">
                            <input type="text" name="description" value="{{ service.description }}" 
                                   class="service-desc-input" oninput="handleEdit(this)">
                        </td>
                        
                        <!-- Price Column -->
                        <td>
                            <div class="price-wrapper">
                                <span>₹</span>
                                <input type="number" name="price" value="{{ service.price }}" 
                                       oninput="handleEdit(this)" min="0" step="0.01">
                            </div>
                        </td>
                        
                        <!-- Actions Column -->
                        <td style="text-align: right;">
                            <!-- Image Update Field (hidden by default, shown on edit) -->
                            <div style="margin-bottom: 8px; display: none;" class="image-update-field">
                                <input type="file" name="image" accept="image/*" style="font-size: 11px;">
                            </div>
                            
                            <button type="button" class="btn btn-update" onclick="toggleImageField(this)" style="margin-bottom: 6px; font-size: 11px; padding: 6px 12px;">
                                🖼️ Change Image
                            </button>
                            
                            <button type="submit" name="action" value="update" class="btn btn-update">Update</button>
                            <button type="submit" name="action" value="delete" class="btn btn-delete" 
                                    onclick="return confirm('Delete this service permanently?')" style="margin-left: 6px;">Delete</button>
                        </td>
                    </form>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
    function handleEdit(input) {
        const row = input.closest('tr');
        const updateBtn = row.querySelector('button[value="update"]');
        updateBtn.classList.add('is-modified');
        updateBtn.style.transform = "scale(1.05)";
    }

    function toggleImageField(btn) {
        const row = btn.closest('tr');
        const imageField = row.querySelector('.image-update-field');
        
        if (imageField.style.display === 'none' || !imageField.style.display) {
            imageField.style.display = 'block';
            btn.textContent = '✕ Cancel';
            btn.style.background = '#fee2e2';
            btn.style.color = '#ef4444';
        } else {
            imageField.style.display = 'none';
            btn.textContent = '🖼️ Change Image';
            btn.style.background = '';
            btn.style.color = '';
        }
    }

    function filterTable() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const rows = document.querySelectorAll('#serviceTable tbody tr');
        rows.forEach(row => {
            const nameField = row.querySelector('.search-target').value.toLowerCase();
            row.style.display = nameField.includes(query) ? "" : "none";
        });
    }
</script>

</body>
</html>
